<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
    <title>Проверка пароля</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="cyber-bg"></div>
<div class="grid-overlay"></div>
<div class="scan-lines"></div>
<div class="noise"></div>

<main class="container">
    <h1 class="neon-title" style="font-size: 2.5rem;">
        <i class="fas fa-shield-alt"></i> ПРОВЕРКА БЕЗОПАСНОСТИ
    </h1>

    <div class="checker-panel">
        <div class="input-group">
            <label>Введите пароль для проверки:</label>
            <div class="password-wrapper">
                <input type="password" id="passwordInput" placeholder="Введите пароль...">
                <button type="button" class="toggle-password" id="togglePassword">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
            <button class="cyber-btn" id="checkBtn"><i class="fas fa-search"></i> Проверить</button>
        </div>

        <div class="result-panel" id="resultPanel" style="display: none;">
            <div class="strength-meter">
                <div class="strength-label">Надёжность:</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="strengthFill" style="width: 0%"></div>
                </div>
                <div class="strength-text" id="strengthText"></div>
            </div>
            <div class="details" id="details"></div>
            <div class="time-info" id="timeInfo"></div>
        </div>
    </div>

    <ul class="glitch-list">
        <li><i class="fas fa-check"></i> <strong>Проект создан в рамках краевого кейс-турнира по программированию "Код ИТ" 2026.</strong></li>
        <li><i class="fas fa-check"></i> <strong>Командой Solo creating 2.0</strong></li>
    </ul>
</main>

<footer class="cyber-footer">
    <div>© 2026 Генератор и оценщик паролей</div>
    <div class="footer-note">Безопасность в ваших руках</div>
</footer>
<a href="index.html" class="back-link-fixed"><i class="fas fa-arrow-left"></i> Назад</a>

<script src="script.js"></script>
</body>
</html>
